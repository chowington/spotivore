name: CI

# Enable Buildkit and let compose use it to speed up image building
env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

on:
  pull_request:
    branches: ['master', 'main']
    paths-ignore: ['docs/**']

  push:
    branches: ['master', 'main']
    paths-ignore: ['docs/**']

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      # Consider using pre-commit.ci for open source project
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  # With no caching at all the entire ci process takes 3m to complete!
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Create env files
        run: |
          mkdir -p .envs/.local
          cat > .envs/.local/.django <<'EOF'
          DJANGO_SETTINGS_MODULE=config.settings.local
          DJANGO_SECRET_KEY=ci-only-not-for-production
          DJANGO_DEBUG=True
          DJANGO_ACCOUNT_ALLOW_REGISTRATION=True
          USE_DOCKER=yes
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          EOF
          cat > .envs/.local/.postgres <<'EOF'
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          POSTGRES_DB=spotivore
          POSTGRES_USER=spotivore
          POSTGRES_PASSWORD=spotivore
          EOF

      - name: Build the Stack
        run: docker compose -f compose.local.yml build django

      - name: Check DB Migrations
        run: docker compose -f compose.local.yml run --rm django python manage.py makemigrations --check

      - name: Run DB Migrations
        run: docker compose -f compose.local.yml run --rm django python manage.py migrate

      - name: Run Django Tests
        run: docker compose -f compose.local.yml run django pytest

      - name: Tear down the Stack
        run: docker compose -f compose.local.yml down

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run Frontend Tests
        run: npx vitest run
        working-directory: client

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: client

      - name: Build frontend
        run: npm run build
        working-directory: client

      - name: Run E2E tests
        run: npx playwright test
        working-directory: client

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: client/playwright-report/
