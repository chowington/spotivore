volumes:
  production_postgres_data: {}
  production_postgres_data_backups: {}
  production_django_media: {}
  django_static: {}
  vue_dist: {}

services:
  django:
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
    image: spotivore_production_django
    volumes:
      - production_django_media:/app/spotivore/media
      - django_static:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
    command: /start
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/5000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  vue-builder:
    build:
      context: .
      dockerfile: ./compose/production/node/Dockerfile
    command: sh -c "npm run build && cp -r /app/client/dist/. /vue_dist/"
    volumes:
      - vue_dist:/vue_dist

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: spotivore_production_postgres
    volumes:
      - production_postgres_data:/var/lib/postgresql/data
      - production_postgres_data_backups:/backups
    env_file:
      - ./.envs/.production/.postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: docker.io/redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: ./compose/production/nginx/Dockerfile
    image: spotivore_production_nginx
    depends_on:
      django:
        condition: service_healthy
      vue-builder:
        condition: service_completed_successfully
    env_file:
      - ./.envs/.production/.django
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - vue_dist:/var/www/vue:ro
      - django_static:/var/www/django/static:ro
      - production_django_media:/usr/share/nginx/media:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "[ -f /var/run/nginx.pid ]"]
      interval: 10s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    restart: unless-stopped
    command: sh -c 'tunnel --no-autoupdate run --token $$CLOUDFLARE_TUNNEL_TOKEN'
    env_file:
      - ./.envs/.production/.cloudflare
    depends_on:
      nginx:
        condition: service_healthy
